server.port=${PORT:8090}

# ── Chatbot mode ──
# false = keyword retrieval over the resume KB (no API key needed)
# true  = Groq LLM RAG grounded on the resume (needs a Groq API key below)
chatbot.use-llm=true

# ── Groq (only used when chatbot.use-llm=true) ──
# Get a free key at https://console.groq.com  →  set env var GROQ_API_KEY
chatbot.groq.api-key=${GROQ_API_KEY:}
chatbot.groq.model=llama-3.3-70b-versatile

# ── CORS: origins allowed to call this API ──
# Add your deployed portfolio domain here when you go live.
chatbot.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3399,http://127.0.0.1:3399}

# ── Contact form email (NO database — sent, not stored) ──
# Where contact-form messages are emailed to:
contact.notify-email=tirth.sutariya21@gmail.com
# Gmail SMTP — create an "App Password" at https://myaccount.google.com/apppasswords
# then set env vars MAIL_USER (your gmail) and MAIL_PASS (the 16-char app password).
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
